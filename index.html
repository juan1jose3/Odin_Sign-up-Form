<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="modern-normalize.css">
    <link rel="stylesheet" href="styles.css">
    <title>Sign-up-form</title>
</head>
<body>
    <div class="main-container">
        
        <section class="image-section">
            
            <div class="dark-overlay">
                <div class="odin-logo">
                    <div class="logo-info">
                        <img src="images/odin-lined.png" alt="" class="logo">
                        <div>
                            <h1 class="special-logo-text">Odin</h1>
                        </div>
                    </div>
                </div>
            </div>
            <div class="credits">
                <p>
                    Image by <a href="https://unsplash.com/photos/a-boat-sitting-on-top-of-a-beach-next-to-a-body-of-water-7MpUE1Y1C58"> Marco De Gregorio </a> From <a href="https://unsplash.com/s/photos/viking-ship">Unsplash</a>
                </p>
            </div>
           
        </section>

        <section class="form-section">
            
            <div class="form-title-wrapper">
                <h1>
                    This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.
                </h1>

                
                <h1>You know you want to.</h1>

                <form action="" method="post">
                    <div class="form-container">
                        <div>
                            <h3>let's do this!</h3>
                        </div>

                        <div class="content">

                            <fieldset class="form-group">
                                <div>
                                    <label for="first_name">First Name</label>
                                    <input type="text" name="firstName" id="first_name" pattern="^[a-zA-Z]+$" minlength="2" required>
                                </div>
    
                                <div>
                                    <label for="user_email">Email</label>
                                    <input type="email" id="user_email" name="userEmail" required>
                                </div>
    
                                <div>
                                    <label for="user_password">Password</label>
                                    <input type="password" id="user_password" name="userPassword" required class="special" minlength="1" maxlength="120">
                                    
                                </div>
                            </fieldset>
    
                            <fieldset class="form-group">
                                <div>
                                    <label for="last_name">Last Name</label>
                                    <input type="text" name="lastName" id="last_name" pattern="^[a-zA-Z]+$"   minlength="2" required>
                                </div>
        
                                <div>

                                    <label for="user_phone">Phone Number</label>
                                    <input type="tel" id="user_phone" name="userPhone" pattern="[0-9+\-() ]+" required>
                                </div>
        
                                <div>
                                    <label for="confirn_pass">Confirm Password</label>
                                    <input type="password" id="confirm_pass" name="confirmPass" required class="special" minlength="1" maxlength="120">
                                  
                                </div>
                            </fieldset>
                        </div>    
                    </div>

                    <div class="info-container">
                        <button type="submit" class="custom-button">Create Account</button>
                        <p>Already have an account? <strong>Log in</strong></p>
                    </div>
                </form>
            </div>

        </section>
    </div>
    
</body>
</html>
